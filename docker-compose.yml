version: '3.8'

services:
  frontend:
    container_name: frontend
    image: pvtbrain_frontend:v1.1
    ports:
      - "5173:80"
    networks:
      - pvtbrain-network

  pb_rag:
    container_name: pb_rag
    image: pvtbrain_rag:v1.0
    ports:
      - "8001:8001"
    networks:
      - pvtbrain-network

  ollama:
    container_name: ollama
    image: pvtbrain_ollama:v1.0
    ports:
      - "11434:11434"
    volumes:
      - pvtbrain_ollama-data:/root/.ollama
    networks:
      - pvtbrain-network

  chroma:
    container_name: chroma
    image: pvtbrain_chromadb:v1.0
    networks:
      - pvtbrain-network

  pb_backend:
    container_name: pb_backend
    image: pvtbrain_backend:v1.4
    ports:
      - "8000:8000"
    networks:
      - pvtbrain-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - pvtbrain-network
    depends_on:
      - pb_backend
      - pb_rag

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - pvtbrain-network
    volumes:
      - pvtbrain_grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pvtbrain-network
    restart: unless-stopped

networks:
  pvtbrain-network:
    name: pvtbrain-network
    external: true

volumes:
  pvtbrain_ollama-data:
    external: true
  pvtbrain_grafana-data:
