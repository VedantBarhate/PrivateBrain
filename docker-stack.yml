version: '3.8'

services:

  frontend:
    image: vedantbarhate/pvtbrain_frontend:v1.1
    ports:
      - target: 80
        published: 5173
        protocol: tcp
        mode: ingress
    networks:
      - pvtbrain-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  pb_backend:
    image: vedantbarhate/pvtbrain_backend:v1.4
    networks:
      - pvtbrain-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  pb_rag:
    image: vedantbarhate/pvtbrain_rag:v1.0
    networks:
      - pvtbrain-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ollama:
    image: vedantbarhate/pvtbrain_ollama:v1.0
    ports:
      - target: 11434
        published: 11434
        protocol: tcp
        mode: ingress
    volumes:
      - pvtbrain_ollama-data:/root/.ollama
    networks:
      - pvtbrain-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  chroma:
    image: vedantbarhate/pvtbrain_chromadb:v1.0
    networks:
      - pvtbrain-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  pvtbrain-network:
    driver: overlay

volumes:
  pvtbrain_ollama-data: