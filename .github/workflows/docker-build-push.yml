name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvtbrain_frontend:v1.1

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvtbrain_backend:v1.4

      - name: Build and push RAG
        uses: docker/build-push-action@v5
        with:
          context: ./RAG
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvtbrain_rag:v1.0

      - name: Build and push Ollama
        uses: docker/build-push-action@v5
        with:
          context: ./ollama
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvtbrain_ollama:v1.0

      - name: Build and push ChromaDB
        uses: docker/build-push-action@v5
        with:
          context: ./chromadb
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvtbrain_chromadb:v1.0